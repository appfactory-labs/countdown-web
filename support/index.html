<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support | Countdown</title>
    <meta
      name="description"
      content="Contact Countdown support for help with app issues or questions."
    />
    <link rel="icon" type="image/png" href="../assets/app-icon.png" />
    <link rel="apple-touch-icon" href="../assets/app-icon.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="../index.html" class="logo">Countdown</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="../privacy/">Privacy</a>
          <a href="../terms/">Terms</a>
          <a href="./" aria-current="page">Support</a>
        </nav>
      </div>
    </header>

    <main class="legal-page">
      <div class="container legal-shell">
        <h1>Support</h1>
        <p class="last-updated">Send us your issue and we will get back to you.</p>

        <div class="support-card">
          <form id="support-form" method="POST" class="support-form">
            <input type="hidden" name="_subject" value="Countdown Support Request" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="table" />
            <input type="hidden" name="_next" value="../support/?sent=1" />

            <label for="full_name">Full name</label>
            <input id="full_name" name="full_name" type="text" required autocomplete="name" />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="8" required></textarea>

            <button type="submit" class="btn-primary">Send message</button>
          </form>

          <p id="support-success" class="support-success" hidden>
            Thanks. Your message was sent.
          </p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <strong>Countdown</strong>
        <nav class="footer-links" aria-label="Footer">
          <a href="../privacy/">Privacy Policy</a>
          <a href="../terms/">Terms of Use</a>
          <a href="./" aria-current="page">Support</a>
        </nav>
        <span class="copyright">© 2026 Countdown | Soulll Studio Inc.</span>
      </div>
    </footer>

    <script>
      (function () {
        const form = document.getElementById('support-form');
        const success = document.getElementById('support-success');
        const inbox = ['dadziemikke2', 'icloud.com'];
        form.action = 'https://formsubmit.co/' + inbox[0] + '@' + inbox[1];

        const params = new URLSearchParams(window.location.search);
        if (params.get('sent') === '1') {
          success.hidden = false;
        }
      })();
    </script>
  </body>
</html>
